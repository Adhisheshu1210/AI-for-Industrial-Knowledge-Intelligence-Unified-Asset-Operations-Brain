name: INDUS AI Unified CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    name: Code Quality & Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run TypeScript Compiler Linting
        run: npm run lint

      - name: Execute Full-Stack Production Build
        run: npm run build
        env:
          NODE_ENV: production

  docker-image-build:
    name: Production Container Verification
    runs-on: ubuntu-latest
    needs: validate-and-test

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: indus-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
